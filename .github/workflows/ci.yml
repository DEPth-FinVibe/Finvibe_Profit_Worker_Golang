name: CI - Build & Deploy (Go)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/profit-worker

      - name: Docker login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: cmh1448/finvibe-profit-worker-golang:${{ env.IMAGE_TAG }}

      - name: Checkout manifest repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          repository: DEPth-FinVibe/Finvibe_Backend_Manifest
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifest

      - name: Update image tag in manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd manifest/profit-worker-golang
          sed -i "s|image: .*|image: cmh1448/finvibe-profit-worker-golang:${{ env.IMAGE_TAG }}|" deployment.yaml

      - name: Commit & Push manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd manifest
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -am "deploy(profit-worker-golang): ${{ env.IMAGE_TAG }}" || exit 0
          git push
